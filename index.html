
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>McNic Holes | Industrial Precision Foundations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --brand-blue: #38b6ff;
        --industrial-slate: #111111;
      }
      
      html {
        scroll-behavior: smooth;
        background-color: var(--industrial-slate);
      }

      body {
        font-family: 'Inter', sans-serif;
        color: #FFFFFF;
        overflow-x: hidden;
      }

      /* Noise Texture Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.05;
        z-index: 9999;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .font-tech { font-family: 'JetBrains Mono', monospace; }
      .font-heavy { font-weight: 900; }

      /* Rugged UI Components */
      .heavy-card {
        background: #181818;
        border: 2px solid #222222;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        position: relative;
      }

      .bolted-corner::after {
        content: "";
        position: absolute;
        width: 4px;
        height: 4px;
        background: #333;
        border-radius: 50%;
        bottom: 6px;
        right: 6px;
        box-shadow: -2px 0 0 #000;
      }

      .embossed-tag {
        background: #1a1a1a;
        border: 1px solid #333;
        box-shadow: 2px 2px 0 #000;
      }

      /* Heavy Underline */
      .accent-line {
        height: 4px;
        background-color: var(--brand-blue);
        width: 40px;
      }

      @keyframes border-beam {
        100% { offset-distance: 100%; }
      }
      .beam {
        position: absolute;
        width: 100px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--brand-blue), transparent);
        offset-path: rect(0 100% 100% 0 round 0);
        animation: border-beam 4s linear infinite;
      }

      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: var(--industrial-slate); }
      ::-webkit-scrollbar-thumb { background: #222; border: 2px solid var(--industrial-slate); }
      ::-webkit-scrollbar-thumb:hover { background: var(--brand-blue); }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: '#38b6ff',
                slate: '#111111',
                card: '#181818',
              }
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "framer-motion": "https://esm.sh/framer-motion@^12.34.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
